<style>
  :root{
    /* light theme · pastel pink + light grey */
    --bg:#EDEFF3; --panel:#FFFFFF; --raised:#F6F7FA; --raised2:#EEF0F4;
    --pink:#E88AAD; --pink-soft:#FBE3EC; --pink-deep:#C4638A; --pink-line:#F0A6C1;
    --ink:#2B2F3A; --lo:#666E7E; --lolo:#9AA1B0;
    --line:#E6E8EC; --line2:#DADDE3;
    --pos:#3F9D7A; --neg:#D2635F;
    --shadow:0 14px 34px -16px rgba(45,48,70,0.22);
    --gold:var(--pink); --mint:var(--pos); --coral:var(--neg);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1100px 560px at 82% -12%, rgba(240,166,193,0.30), transparent 60%),
      radial-gradient(860px 480px at -8% 18%, rgba(180,190,208,0.28), transparent 58%),
      var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.45; min-height:100%;
  }
  .num{font-family:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace; font-variant-numeric:tabular-nums; letter-spacing:-0.02em}
  .wrap{max-width:1080px; margin:0 auto; padding:calc(28px + env(safe-area-inset-top)) calc(22px + env(safe-area-inset-right)) calc(80px + env(safe-area-inset-bottom)) calc(22px + env(safe-area-inset-left))}

  .top{display:flex; align-items:center; justify-content:space-between; margin-bottom:26px; flex-wrap:wrap; gap:12px}
  .brand{display:flex; align-items:baseline; gap:12px}
  .mark{font-weight:800; font-size:26px; letter-spacing:0.14em; text-transform:uppercase;
    background:linear-gradient(180deg,#EA8FB1,#C4638A); -webkit-background-clip:text; background-clip:text; color:transparent}
  .mark .dot{color:var(--pink-deep); -webkit-text-fill-color:var(--pink-deep)}
  .tag{color:var(--lolo); font-size:11px; letter-spacing:0.22em; text-transform:uppercase}
  .topbtns{display:flex; gap:8px}
  .ghost{background:var(--panel); border:1px solid var(--line2); color:var(--lo); padding:8px 12px; border-radius:10px; font-size:12px; cursor:pointer; transition:.15s}
  .ghost:hover{color:var(--pink-deep); border-color:var(--pink-line)}

  .grid{display:grid; gap:16px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:20px; box-shadow:var(--shadow)}
  .card h3{font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--lolo); font-weight:700; margin-bottom:14px}

  .kpis{grid-template-columns:repeat(4,1fr)}
  .kpi .lbl{font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--lolo); margin-bottom:8px}
  .kpi .big{font-size:26px; font-weight:700}
  .kpi .sub{font-size:12px; color:var(--lo); margin-top:6px}
  .pos{color:var(--pos)} .neg{color:var(--neg)} .pinkc{color:var(--pink-deep)}

  .bar{height:8px; background:rgba(20,24,40,0.07); border-radius:99px; overflow:hidden; margin-top:10px}
  .bar > span{display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--pink),#F3B8CE)}
  .barrow{display:flex; align-items:center; gap:12px; margin:10px 0}
  .barrow .name{width:120px; font-size:13px; color:var(--lo); flex:none}
  .barrow .track{flex:1; height:22px; background:rgba(20,24,40,0.05); border-radius:8px; position:relative; overflow:hidden}
  .barrow .fill{position:absolute; inset:0 auto 0 0; border-radius:8px; background:linear-gradient(90deg, rgba(232,138,173,0.9), rgba(240,166,193,0.45))}
  .barrow .val{width:96px; text-align:right; font-size:13px; flex:none}

  .score{display:flex; align-items:center; gap:16px}
  .ring{width:92px; height:92px; flex:none}
  .score .meta .n{font-size:34px; font-weight:800; line-height:1}
  .score .meta .d{font-size:12px; color:var(--lo); margin-top:4px}

  .chips{display:flex; gap:20px; flex-wrap:wrap; margin-bottom:16px}
  .chip .cl{font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--lolo)}
  .chip .cv{font-size:20px; font-weight:700; margin-top:3px}
  .billrow{display:flex; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--line)}
  .billrow:last-of-type{border-bottom:none}
  .billrow .bn{flex:1; min-width:0}
  .billrow .bn .t{font-size:14px; font-weight:600}
  .billrow .bn .s{font-size:12px; color:var(--lo)}
  .billrow .amt{width:90px; text-align:right; font-size:14px; flex:none}
  .stat{font-size:11px; padding:3px 10px; border-radius:99px; font-weight:600; white-space:nowrap}
  .stat.paid{background:rgba(63,157,122,0.14); color:var(--pos)}
  .stat.due{background:var(--pink-soft); color:var(--pink-deep)}
  .stat.over{background:rgba(210,99,95,0.14); color:var(--neg)}
  .mini{background:var(--panel); border:1px solid var(--line2); color:var(--lo); padding:6px 11px; border-radius:9px; font-size:12px; cursor:pointer; transition:.15s; white-space:nowrap}
  .mini:hover{border-color:var(--pink-line); color:var(--pink-deep)}
  .mini.solid{background:var(--pink); border-color:var(--pink); color:#4A2436; font-weight:700}
  .mini.solid:hover{filter:brightness(1.04); color:#4A2436}

  table{width:100%; border-collapse:collapse}
  th{text-align:left; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--lolo); font-weight:700; padding:8px; border-bottom:1px solid var(--line)}
  td{padding:11px 8px; border-bottom:1px solid var(--line); font-size:14px}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block; font-size:11px; padding:3px 9px; border-radius:99px; background:rgba(20,24,40,0.05); color:var(--lo)}
  .pill.inc{background:rgba(63,157,122,0.14); color:var(--pos)}
  .del{color:var(--lolo); cursor:pointer; background:none; border:none; font-size:13px}
  .del:hover{color:var(--neg)}

  label.f{display:block; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--lolo); margin:0 0 6px}
  input,select{width:100%; background:var(--raised); border:1px solid var(--line2); color:var(--ink);
    padding:11px 12px; border-radius:11px; font-size:14px; font-family:inherit; outline:none; transition:.15s}
  input:focus,select:focus{border-color:var(--pink-line); box-shadow:0 0 0 3px rgba(240,166,193,0.25); background:var(--panel)}
  input.num{font-family:ui-monospace,Menlo,monospace}
  .btn{background:linear-gradient(180deg,#F0A6C1,#E285A8); color:#4A2436; border:none; padding:12px 18px; border-radius:12px; font-weight:700; font-size:14px; cursor:pointer; transition:.15s}
  .btn:hover{filter:brightness(1.04)}
  .btn.wide{width:100%}
  .row{display:grid; gap:12px}
  .r3{grid-template-columns:1.2fr 1fr 1fr} .r2{grid-template-columns:1fr 1fr} .r4{grid-template-columns:repeat(4,1fr)}
  .r4b{grid-template-columns:1.4fr 1fr 0.8fr 1fr}

  .seg{display:inline-flex; background:var(--raised2); border:1px solid var(--line2); border-radius:12px; padding:4px}
  .seg button{background:none; border:none; color:var(--lo); padding:8px 16px; border-radius:9px; font-size:13px; cursor:pointer; font-weight:600}
  .seg button.on{background:var(--pink-soft); color:var(--pink-deep)}

  .muted{color:var(--lo)} .tiny{font-size:12px}
  .empty{color:var(--lolo); font-size:13px; padding:18px 4px; text-align:center}
  .flex{display:flex; align-items:center; gap:10px} .between{justify-content:space-between}
  .mt{margin-top:16px} .mt24{margin-top:24px}
  .toast{position:fixed; bottom:calc(22px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--panel); border:1px solid var(--line2); color:var(--ink); padding:12px 18px; border-radius:12px; font-size:13px; opacity:0; pointer-events:none; transition:.25s; box-shadow:var(--shadow); z-index:50}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  .ob{max-width:520px; margin:6vh auto 0}
  .ob .card{padding:28px}
  .steps{display:flex; gap:6px; margin-bottom:22px}
  .steps i{height:4px; flex:1; border-radius:99px; background:rgba(20,24,40,0.08)}
  .steps i.on{background:var(--pink)}
  .ob h2{font-size:22px; margin-bottom:6px; font-weight:700}
  .ob p.lede{color:var(--lo); font-size:14px; margin-bottom:22px}
  .hint{font-size:12px; color:var(--lolo); margin-top:8px}

  @media(max-width:820px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .r3,.r4,.r4b{grid-template-columns:1fr 1fr}
    .cols2{grid-template-columns:1fr !important}
  }
  @media(max-width:520px){ .r2,.r3,.r4,.r4b{grid-template-columns:1fr} .barrow .name{width:88px} }
  svg text{font-family:ui-monospace,Menlo,monospace}
  :focus-visible{outline:2px solid var(--pink); outline-offset:2px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* Kwonky — offline personal wealth OS. Data lives in this browser
 * (localStorage). No server. Export the JSON to back up / move devices. */
const KEY = "kwonky_v1";
const DEFAULT_CATS = ["Coffee","Latte","Food","Shopping (Online)","Shopping (Offline)","Clients","Medical","Others"];
const DEFAULT_INCOME = ["Prudential","PA"];
const ACCT_TYPES = ["Savings","Investment","Insurance","Retirement","Other"];
const ACCT_COLOR = {Savings:"#E88AAD", Investment:"#B8C0CE", Insurance:"#F0B8CE", Retirement:"#9AA6B8", Other:"#D8DCE3"};

const DEFAULT = () => ({
  profile:{ name:"", currency:"$", pay1Day:1, pay1Amt:0, pay2Day:15, pay2Amt:0, budget:0 },
  tx:[], goals:[], bills:[], accounts:[], netHistory:[],
  cats:DEFAULT_CATS.slice(), incomeSources:DEFAULT_INCOME.slice(), created: Date.now()
});

/* safe storage: iOS file://, Private Browsing, or blocked cookies make
 * localStorage THROW. Wrap every access so the app never dies on it. */
let STORAGE_OK = (function(){ try{ const t="__k_probe"; localStorage.setItem(t,"1"); localStorage.removeItem(t); return true; }catch(e){ return false; } })();
const LS = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); return true; }catch(e){ STORAGE_OK=false; return false; } },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} }
};
function load(){ try{ const r=LS.get(KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
function migrate(){ if(!DB) return; if(!DB.bills) DB.bills=[]; if(!DB.goals) DB.goals=[]; if(!DB.tx) DB.tx=[]; if(!DB.accounts) DB.accounts=[]; if(!DB.netHistory) DB.netHistory=[]; if(!DB.cats||!DB.cats.length) DB.cats=DEFAULT_CATS.slice(); if(!DB.incomeSources||!DB.incomeSources.length) DB.incomeSources=DEFAULT_INCOME.slice(); }
/* ---- persistence: plaintext OR encrypted-at-rest (AES-GCM, key from passcode) ---- */
const ENCKEY="kwonky_enc_v1";
const CRYPTO={ enabled:false, key:null, salt:null, blur:true };
const _enc=new TextEncoder(), _dec=new TextDecoder();
function _b64(buf){ let s=""; const b=new Uint8Array(buf); for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
function _ub64(s){ return Uint8Array.from(atob(s),c=>c.charCodeAt(0)); }
async function _derive(pass,salt){
  const base=await crypto.subtle.importKey("raw",_enc.encode(pass),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
let _persisting=false,_dirty=false;
async function persist(){
  if(!CRYPTO.key){ return; }
  if(_persisting){ _dirty=true; return; }
  _persisting=true;
  try{
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},CRYPTO.key,_enc.encode(JSON.stringify(DB)));
    LS.set(ENCKEY, JSON.stringify({v:1,salt:_b64(CRYPTO.salt),iv:_b64(iv),ct:_b64(ct)}));
  }catch(e){ toast("Save failed — data kept in memory"); }
  finally{ _persisting=false; if(_dirty){ _dirty=false; persist(); } }
}
function save(){ if(CRYPTO.enabled){ persist(); } else { LS.set(KEY, JSON.stringify(DB)); } }

async function enableEncryption(pass){
  CRYPTO.salt=crypto.getRandomValues(new Uint8Array(16));
  CRYPTO.key=await _derive(pass,CRYPTO.salt);
  CRYPTO.enabled=true;
  await persist();
  LS.del(KEY);       // remove the plaintext copy
  _idleMs=(DB.profile.idleMin||3)*60000; bumpAct();
}
async function unlock(pass){
  const env=JSON.parse(LS.get(ENCKEY));
  const salt=_ub64(env.salt);
  const key=await _derive(pass,salt);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:_ub64(env.iv)},key,_ub64(env.ct)); // throws on wrong passcode
  DB=JSON.parse(_dec.decode(pt)); migrate();
  CRYPTO.key=key; CRYPTO.salt=salt; CRYPTO.enabled=true; CRYPTO.blur=true;
  _idleMs=(DB.profile.idleMin||3)*60000; bumpAct();
}
async function changePasscode(pass){
  CRYPTO.salt=crypto.getRandomValues(new Uint8Array(16));
  CRYPTO.key=await _derive(pass,CRYPTO.salt);
  await persist(); toast("Passcode changed");
}
function lockNow(){ CRYPTO.key=null; renderLock(); }

/* idle auto-relock */
let _idleMs=180000, _lastAct=Date.now();
function bumpAct(){ _lastAct=Date.now(); }
["click","keydown","touchstart","mousemove"].forEach(e=>document.addEventListener(e,bumpAct,{passive:true}));
setInterval(()=>{ if(CRYPTO.enabled && CRYPTO.key && (Date.now()-_lastAct)>_idleMs){ lockNow(); } },10000);

/* mask helper for on-screen blur (does not affect stored data) */
function mask(str){ return CRYPTO.enabled && CRYPTO.blur ? "••••" : str; }
function toggleBlur(){ CRYPTO.blur=!CRYPTO.blur; renderApp(); }

function renderLock(err){
  $("#app").innerHTML=`<div class="top"><div class="brand"><span class="mark">Kwonky<span class="dot">.</span></span><span class="tag">Locked</span></div></div>
    <div class="ob"><div class="card" style="text-align:center">
      <div style="font-size:34px;margin:6px 0 10px">🔒</div>
      <h2 style="font-size:20px">Enter passcode</h2>
      <p class="lede" style="margin-bottom:18px">Your data is encrypted on this device.</p>
      <input id="lk_pass" type="password" inputmode="numeric" placeholder="Passcode" style="text-align:center" onkeydown="if(event.key==='Enter')tryUnlock()">
      ${err?`<div class="tiny neg mt">${err}</div>`:""}
      <button class="btn wide mt24" onclick="tryUnlock()">Unlock</button>
      <div class="hint">Forgot it? There's no recovery — the data can only be reset (erased) below.</div>
      <button class="del tiny mt" onclick="wipe()">Reset & erase all data</button>
    </div></div>`;
  setTimeout(()=>{ const el=$("#lk_pass"); if(el) el.focus(); },50);
}
async function tryUnlock(){
  const p=($("#lk_pass")||{}).value||"";
  if(!p){ return; }
  try{ await unlock(p); renderApp(); toast("Unlocked"); }
  catch(e){ renderLock("Wrong passcode — try again"); }
}
function renderSetupEncryption(){
  $("#app").innerHTML=`<div class="top"><div class="brand"><span class="mark">Kwonky<span class="dot">.</span></span><span class="tag">Security</span></div>
    <button class="ghost" onclick="renderApp()">← Skip for now</button></div>
    <div class="ob"><div class="card">
      <h2 style="font-size:20px">Set a passcode</h2>
      <p class="lede">Encrypts your whole dataset — accounts, transactions, everything — so it's unreadable without this passcode, even by someone who opens the file.</p>
      <label class="f">Passcode</label><input id="se_p1" type="password" inputmode="numeric" placeholder="Choose a passcode">
      <label class="f mt">Confirm passcode</label><input id="se_p2" type="password" inputmode="numeric" placeholder="Re-enter it">
      <div class="card" style="background:rgba(210,99,95,0.08);border-color:rgba(210,99,95,0.3);margin-top:16px;box-shadow:none">
        <div class="tiny" style="color:var(--neg)"><b>No recovery.</b> If you forget this passcode, the data is permanently unreadable. There is no reset link, by design. Export a backup you can re-import if unsure — note the backup is encrypted too.</div>
      </div>
      <button class="btn wide mt24" onclick="doEnableEncryption()">Encrypt my data</button>
    </div></div>`;
}
async function doEnableEncryption(){
  const a=$("#se_p1").value||"", b=$("#se_p2").value||"";
  if(a.length<4){ toast("Use at least 4 characters"); return; }
  if(a!==b){ toast("Passcodes don't match"); return; }
  await enableEncryption(a); renderApp(); toast("Encryption on");
}
let DB = load(); migrate();

const $ = (s,el=document)=>el.querySelector(s);
const uid = ()=>Math.random().toString(36).slice(2,9);
const cur = ()=>DB.profile.currency||"$";
const fmt = n => cur()+Math.abs(Math.round(n)).toLocaleString();
const fmtSigned = n => (n<0?"-":"")+fmt(n);
const today = ()=> new Date().toISOString().slice(0,10);
const pad2 = n => String(n).padStart(2,"0");
function monthKey(d){ return d.slice(0,7); }
function thisMonth(){ return today().slice(0,7); }
function daysInMonth(ym){ const [y,m]=ym.split("-").map(Number); return new Date(y,m,0).getDate(); }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1800); }
function monthTx(ym){ return DB.tx.filter(t=>monthKey(t.date)===ym); }
function sum(arr,f){ return arr.reduce((a,b)=>a+f(b),0); }
function expectedIncome(){ return (+DB.profile.pay1Amt||0)+(+DB.profile.pay2Amt||0); }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function billPaidThisMonth(id){ return DB.tx.some(t=>t.billId===id && monthKey(t.date)===thisMonth()); }

/* ============================ ONBOARDING ============================ */
let obStep = 0;
function renderOnboard(){
  const p=DB.profile, app=$("#app");
  const steps=[0,1,2].map(i=>`<i class="${i<=obStep?'on':''}"></i>`).join("");
  let inner="";
  if(obStep===0){
    inner=`<h2>Welcome to Kwonky.</h2>
      <p class="lede">A private wealth OS that lives in this browser. First — who am I working for?</p>
      <label class="f">Your name</label><input id="i_name" placeholder="e.g. Alex" value="${escapeHtml(p.name)}">
      <div class="row r2 mt"><div><label class="f">Currency symbol</label><input id="i_cur" class="num" value="${escapeHtml(p.currency||'$')}" maxlength="3"></div></div>
      <p class="hint">Nothing leaves this device. Back up anytime via Export.</p>
      <button class="btn wide mt24" onclick="obNext()">Continue</button>`;
  } else if(obStep===1){
    inner=`<h2>Your income arrives twice a month.</h2>
      <p class="lede">The two paydays and amounts drive the burn-down and your savings score.</p>
      <div class="row r2"><div><label class="f">Payday 1 — day</label><input id="i_d1" class="num" type="number" min="1" max="31" value="${p.pay1Day||1}"></div>
        <div><label class="f">Amount</label><input id="i_a1" class="num" type="number" min="0" value="${p.pay1Amt||''}" placeholder="0"></div></div>
      <div class="row r2 mt"><div><label class="f">Payday 2 — day</label><input id="i_d2" class="num" type="number" min="1" max="31" value="${p.pay2Day||15}"></div>
        <div><label class="f">Amount</label><input id="i_a2" class="num" type="number" min="0" value="${p.pay2Amt||''}" placeholder="0"></div></div>
      <p class="hint">Not fixed? Use typical amounts — log the real figure each time it lands.</p>
      <div class="row r2 mt24"><button class="ghost" onclick="obBack()">Back</button><button class="btn" onclick="obNext()">Continue</button></div>`;
  } else {
    const inc=expectedIncome();
    inner=`<h2>Set a monthly spending ceiling.</h2>
      <p class="lede">Everything under it becomes savings. Income is <span class="pinkc num">${fmt(inc)}</span>/mo — what's the most you want to spend?</p>
      <label class="f">Monthly spending budget</label>
      <input id="i_budget" class="num" type="number" min="0" value="${p.budget||''}" placeholder="${Math.round(inc*0.7)||'0'}">
      <p class="hint">A common target: ~70% spent, 30% saved. Change it anytime.</p>
      <div class="row r2 mt24"><button class="ghost" onclick="obBack()">Back</button><button class="btn" onclick="obFinish()">Launch dashboard</button></div>`;
  }
  app.innerHTML=`<div class="top"><div class="brand"><span class="mark">Kwonky<span class="dot">.</span></span><span class="tag">Wealth OS</span></div></div>
    <div class="ob"><div class="card"><div class="steps">${steps}</div>${inner}</div></div>`;
}
function obNext(){
  if(obStep===0){ DB.profile.name=($("#i_name").value||"").trim(); DB.profile.currency=($("#i_cur").value||"$").trim()||"$"; }
  else if(obStep===1){ DB.profile.pay1Day=+$("#i_d1").value||1; DB.profile.pay1Amt=+$("#i_a1").value||0; DB.profile.pay2Day=+$("#i_d2").value||15; DB.profile.pay2Amt=+$("#i_a2").value||0; }
  save(); obStep++; renderOnboard();
}
function obBack(){ obStep--; renderOnboard(); }
function obFinish(){ DB.profile.budget=+$("#i_budget").value||0; save(); renderApp(); toast("Dashboard ready. Add your recurring bills, then log spending."); }

/* ============================ CHARTS ============================ */
function burndownSVG(){
  const ym=thisMonth(), dim=daysInMonth(ym), budget=+DB.profile.budget||0, p=DB.profile;
  const spendByDay={};
  monthTx(ym).filter(t=>t.type==="expense").forEach(t=>{ const d=+t.date.slice(8,10); spendByDay[d]=(spendByDay[d]||0)+t.amount; });
  const W=640,H=200,padL=48,padR=14,padT=18,padB=24;
  const x=d=>padL+(d-1)/(dim-1)*(W-padL-padR);
  const maxY=Math.max(budget,1);
  const y=v=>padT+(1-Math.min(Math.max(v,0),maxY)/maxY)*(H-padT-padB);
  const todayD=+today().slice(8,10);
  let cum=0, pts=[];
  for(let d=1; d<=dim; d++){ cum+=spendByDay[d]||0; if(d>todayD) break; pts.push([x(d),y(budget-cum)]); }
  const path=pts.map((pt,i)=>(i?"L":"M")+pt[0].toFixed(1)+" "+pt[1].toFixed(1)).join(" ");
  const ideal=`M${x(1)} ${y(budget)} L${x(dim)} ${y(0)}`;
  const pays=[p.pay1Day,p.pay2Day].filter(d=>d>=1&&d<=dim);
  const payMarks=pays.map(d=>`<line x1="${x(d)}" y1="${padT}" x2="${x(d)}" y2="${H-padB}" stroke="rgba(232,138,173,0.5)" stroke-dasharray="3 4"/><text x="${x(d)}" y="${padT-5}" fill="#C4638A" font-size="9" text-anchor="middle">pay</text>`).join("");
  const gridY=[0,0.5,1].map(f=>{ const yy=padT+f*(H-padT-padB), val=maxY*(1-f);
    return `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="rgba(20,24,40,0.06)"/><text x="${padL-6}" y="${yy+3}" fill="#9AA1B0" font-size="9" text-anchor="end">${cur()}${Math.round(val).toLocaleString()}</text>`; }).join("");
  const last=pts[pts.length-1], remain=budget-cum, dotColor=remain<0?"var(--neg)":"var(--pos)";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Budget burn-down">
    ${gridY}${payMarks}
    <path d="${ideal}" fill="none" stroke="rgba(20,24,40,0.18)" stroke-width="1.5" stroke-dasharray="2 5"/>
    <path d="${path}" fill="none" stroke="var(--pink)" stroke-width="2.5" stroke-linejoin="round"/>
    ${last?`<circle cx="${last[0]}" cy="${last[1]}" r="4" fill="${dotColor}"/>`:""}</svg>`;
}
function categoryBars(ym){
  const ex=monthTx(ym).filter(t=>t.type==="expense"), byCat={};
  ex.forEach(t=>byCat[t.cat]=(byCat[t.cat]||0)+t.amount);
  const rows=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  if(!rows.length) return `<div class="empty">No expenses logged this month yet.</div>`;
  const max=rows[0][1];
  return rows.map(([c,v])=>`<div class="barrow"><span class="name">${c}</span><span class="track"><span class="fill" style="width:${Math.max(4,v/max*100)}%"></span></span><span class="val num">${fmt(v)}</span></div>`).join("");
}
function weeklyTrendSVG(){
  const now=new Date(), weeks=[];
  for(let i=5;i>=0;i--){ const end=new Date(now); end.setDate(now.getDate()-i*7); const start=new Date(end); start.setDate(end.getDate()-6);
    const s=start.toISOString().slice(0,10), e=end.toISOString().slice(0,10);
    const tot=sum(DB.tx.filter(t=>t.type==="expense"&&t.date>=s&&t.date<=e),t=>t.amount);
    weeks.push({tot,label:(start.getMonth()+1)+"/"+start.getDate()}); }
  const W=640,H=170,padL=40,padR=10,padT=16,padB=26, max=Math.max(1,...weeks.map(w=>w.tot)), bw=(W-padL-padR)/weeks.length;
  const bars=weeks.map((w,i)=>{ const h=(w.tot/max)*(H-padT-padB), xx=padL+i*bw+bw*0.18, ww=bw*0.64, yy=H-padB-h;
    return `<rect x="${xx}" y="${yy}" width="${ww}" height="${Math.max(1,h)}" rx="4" fill="${i===weeks.length-1?'var(--pink)':'rgba(232,138,173,0.4)'}"/><text x="${xx+ww/2}" y="${H-padB+13}" fill="#9AA1B0" font-size="9" text-anchor="middle">${w.label}</text><text x="${xx+ww/2}" y="${yy-5}" fill="#7A8290" font-size="9" text-anchor="middle">${w.tot?cur()+Math.round(w.tot):''}</text>`; }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Weekly spend trend">${bars}</svg>`;
}
function ringSVG(pct,color){
  const r=40,c=2*Math.PI*r, off=c*(1-Math.max(0,Math.min(1,pct/100)));
  return `<svg class="ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(20,24,40,0.08)" stroke-width="9"/><circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)"/></svg>`;
}

/* ============================ BILLS ============================ */
function billsCard(){
  const ym=thisMonth(), dim=daysInMonth(ym), todayD=+today().slice(8,10);
  const bills=[...DB.bills].sort((a,b)=>a.day-b.day);
  const totalExp=sum(bills,b=>b.amount);
  const paidAmt=sum(bills.filter(b=>billPaidThisMonth(b.id)),b=>b.amount);
  const unpaid=totalExp-paidAmt;
  const spent=sum(monthTx(ym).filter(t=>t.type==="expense"),t=>t.amount);
  const budget=+DB.profile.budget||0;
  const safe=budget-spent-unpaid;

  const list = bills.length ? bills.map(b=>{
    const paid=billPaidThisMonth(b.id);
    const day=Math.min(b.day,dim);
    let stat, cls, action;
    if(paid){ stat="Paid"; cls="paid"; action=`<button class="mini" onclick="unpayBill('${b.id}')">Undo</button>`; }
    else if(day<todayD){ stat="Overdue"; cls="over"; action=`<button class="mini solid" onclick="payBill('${b.id}')">Mark paid</button>`; }
    else if(day===todayD){ stat="Due today"; cls="due"; action=`<button class="mini solid" onclick="payBill('${b.id}')">Mark paid</button>`; }
    else { stat="Due in "+(day-todayD)+"d"; cls="due"; action=`<button class="mini solid" onclick="payBill('${b.id}')">Mark paid</button>`; }
    return `<div class="billrow">
      <div class="bn"><div class="t">${escapeHtml(b.name)}</div><div class="s">day ${b.day} · ${b.cat}</div></div>
      <span class="amt num">${fmt(b.amount)}</span>
      <span class="stat ${cls}">${stat}</span>
      ${action}
      <button class="del" title="remove bill" onclick="delBill('${b.id}')">✕</button>
    </div>`;
  }).join("") : `<div class="empty">No recurring bills yet. Add rent, subscriptions, utilities — anything that hits on the same day each month.</div>`;

  return `<div class="card mt">
    <div class="flex between" style="margin-bottom:16px"><h3 style="margin:0">Recurring bills</h3>
      <span class="tiny muted">${bills.length} bill${bills.length===1?'':'s'} · ${fmt(totalExp)}/mo</span></div>
    <div class="chips">
      <div class="chip"><div class="cl">Safe to spend</div><div class="cv num ${safe<0?'neg':'pinkc'}">${fmtSigned(safe)}</div></div>
      <div class="chip"><div class="cl">Bills paid</div><div class="cv num">${fmt(paidAmt)}</div></div>
      <div class="chip"><div class="cl">Still due</div><div class="cv num ${unpaid>0?'neg':'pos'}">${fmt(unpaid)}</div></div>
    </div>
    ${list}
    <div class="row r4b mt24">
      <input id="nb_name" placeholder="Bill name (e.g. Rent)">
      <input id="nb_amt" class="num" type="number" min="0" placeholder="Amount">
      <input id="nb_day" class="num" type="number" min="1" max="31" placeholder="Day">
      <select id="nb_cat">${DB.cats.map(c=>`<option>${escapeHtml(c)}</option>`).join("")}</select>
    </div>
    <button class="btn mt" onclick="addBill()">Add recurring bill</button>
    <div class="hint">“Safe to spend” = budget − spent − bills still due. It’s what’s truly discretionary after commitments.</div>
  </div>`;
}
function addBill(){
  const name=($("#nb_name").value||"").trim(), amt=+$("#nb_amt").value, day=+$("#nb_day").value;
  if(!name||!amt||!day){ toast("Need a name, amount and day"); return; }
  if(day<1||day>31){ toast("Day must be 1–31"); return; }
  DB.bills.push({id:uid(),name,amount:Math.round(amt*100)/100,day,cat:$("#nb_cat").value}); save(); renderApp(); toast("Bill added");
}
function delBill(id){ if(!confirm("Remove this recurring bill? Past payments stay logged.")) return; DB.bills=DB.bills.filter(b=>b.id!==id); save(); renderApp(); }
function payBill(id){
  const b=DB.bills.find(x=>x.id===id); if(!b) return;
  const dim=daysInMonth(thisMonth()); const d=Math.min(b.day,dim);
  DB.tx.push({id:uid(),date:`${thisMonth()}-${pad2(d)}`,type:"expense",amount:b.amount,cat:b.cat,note:b.name,billId:b.id});
  save(); renderApp(); toast(b.name+" marked paid");
}
function unpayBill(id){ DB.tx=DB.tx.filter(t=>!(t.billId===id && monthKey(t.date)===thisMonth())); save(); renderApp(); toast("Payment undone"); }

/* ============================ ACCOUNTS / NET WORTH ============================ */
function avgMonthlySpend(){
  const b=+DB.profile.budget||0; if(b>0) return b;
  const byM={}; DB.tx.filter(t=>t.type==="expense").forEach(t=>{const k=monthKey(t.date); byM[k]=(byM[k]||0)+t.amount;});
  const vals=Object.values(byM); return vals.length? vals.reduce((a,c)=>a+c,0)/vals.length : 0;
}
function recordNet(){ const total=sum(DB.accounts,a=>a.balance); const d=today(); DB.netHistory=DB.netHistory.filter(h=>h.date!==d); DB.netHistory.push({date:d,total}); }
function netTrendSVG(){
  const h=[...DB.netHistory].sort((a,b)=>a.date.localeCompare(b.date)).slice(-14);
  if(h.length<2) return `<div class="empty">Update balances on different days (or hit Save snapshot) to chart your net-worth trajectory.</div>`;
  const W=640,H=140,padL=52,padR=12,padT=14,padB=22;
  const vals=h.map(p=>p.total), min=Math.min(...vals), max=Math.max(...vals), span=(max-min)||1;
  const x=i=>padL+i/(h.length-1)*(W-padL-padR);
  const y=v=>padT+(1-(v-min)/span)*(H-padT-padB);
  const path=h.map((p,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(p.total).toFixed(1)).join(" ");
  const area=path+` L${x(h.length-1).toFixed(1)} ${H-padB} L${x(0).toFixed(1)} ${H-padB} Z`;
  const lastv=h[h.length-1].total, chg=lastv-h[0].total;
  const grid=[max,min].map(v=>`<text x="${padL-6}" y="${y(v)+3}" fill="#9AA1B0" font-size="9" text-anchor="end">${cur()}${Math.round(v).toLocaleString()}</text>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Net worth trend">
    ${grid}
    <path d="${area}" fill="rgba(232,138,173,0.12)"/>
    <path d="${path}" fill="none" stroke="var(--pink)" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="${x(h.length-1)}" cy="${y(lastv)}" r="4" fill="${chg<0?'var(--neg)':'var(--pos)'}"/></svg>`;
}

function doExport(){

  const blob=new Blob([data],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  toast(CRYPTO.enabled?"Encrypted backup downloaded":"Backup downloaded");
}
function doImport(){ const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json";
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const raw=r.result; const d=JSON.parse(raw);
    if(d && d.ct && d.iv && d.salt){ LS.set(ENCKEY, raw); LS.del(KEY); CRYPTO.enabled=true; CRYPTO.key=null; renderLock(); toast("Encrypted backup loaded — enter its passcode"); return; }
    if(d && d.profile && Array.isArray(d.tx)){ DB=d; migrate(); if(CRYPTO.enabled){ persist(); } else { save(); } renderApp(); toast("Data imported"); return; }
    throw 0;
  }catch(_){ toast("That file isn't a Kwonky backup"); } }; r.readAsText(f); };
  inp.click(); }
function wipe(){ if(confirm("Erase ALL Kwonky data in this browser? Export a backup first if unsure. If encrypted and you forgot the passcode, this is the only way forward — and the data is gone.")){ LS.del(KEY); LS.del(ENCKEY); CRYPTO.enabled=false; CRYPTO.key=null; CRYPTO.salt=null; DB=DEFAULT(); obStep=0; renderApp(); } }

      2. You're in <b>Private Browsing</b> — switch to a normal tab.<br>
      3. Site data / cookies are <b>blocked</b> in Safari settings for this site.
    </div>
    <button class="btn wide mt24" onclick="bootContinue(true)">Continue anyway (won't save)</button>
    <div class="hint">Fixing the address is the real solution — in-memory mode loses everything on close.</div>
  </div></div>`;
}
function bootContinue(force){
  DB=load(); migrate(); if(!DB){ DB=DEFAULT(); }
  renderApp();
  if(force||!STORAGE_OK) toast("Running without saving — data is temporary");
}
function boot(){
  if(!STORAGE_OK){ renderStorageWarning(); return; }
  if(LS.get(ENCKEY)){ CRYPTO.enabled=true; renderLock(); return; }
  DB=load(); migrate(); if(!DB){ DB=DEFAULT(); }
  renderApp();
}
boot();
</script>
